<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hwrang Application</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-5">
        <h1 class="text-3xl font-bold mb-5">Hwrang Application</h1>
        
        <!-- Character Selection -->
        <section id="character-selection" class="mb-8">
            <h2 class="text-2xl mb-3">Character Selection</h2>
            <!-- Add character selection inputs here -->
        </section>

        <!-- Study Timer -->
        <section id="study-timer" class="mb-8">
            <h2 class="text-2xl mb-3">Study Timer</h2>
            <!-- Add study timer implementation here -->
        </section>

        <!-- Calendar -->
        <section id="calendar" class="mb-8">
            <h2 class="text-2xl mb-3">Calendar</h2>
            <!-- Add calendar here -->
        </section>

        <!-- Statistics -->
        <section id="statistics" class="mb-8">
            <h2 class="text-2xl mb-3">Statistics</h2>
            <canvas id="myChart"></canvas>
            <script>
                // Sample data for Chart.js
                const ctx = document.getElementById('myChart').getContext('2d');
                const myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['January', 'February', 'March'],
                        datasets: [{
                            label: '# of Studies',
                            data: [12, 19, 3],
                            backgroundColor: 'rgba(255, 99, 132, 0.2)',
                            borderColor: 'rgba(255, 99, 132, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            </script>
        </section>

        <!-- Community Square -->
        <section id="community-square" class="mb-8">
            <h2 class="text-2xl mb-3">Community Square</h2>
            <!-- Add community interactions here -->
        </section>
    </div>
</body>
</html>
